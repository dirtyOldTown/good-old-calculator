<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/68977216dc.js" crossorigin="anonymous" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <script type="module" src="main.js" defer></script>
</head>
<body>
  <main>
    <div class="calculator-container">
    <section id="monitor">
      <div class="display back">
       <textarea type="text" id="expression" rows="2" placeholder="your expression"></textarea>
      </div>
      <div class="display result">
       <textarea type="text" placeholder="0" id="result" rows="1"></textarea>
      </div>
    </section>
    <section id="calculator-table">
      <ul class="table-container">
        <li>
          <button id="all-clear" type="button" class="computation regulation" data-value="AC">AC</button>
          <button id="clear" type="button" class="computation clear" data-value="C"><i class="fas fa-backspace fa-back"></i></button>
          <button id="sqrt" class="input-view advanced-operator computation" type="button" data-value="&Sqrt;">&Sqrt;</button>
          <button type="button" class="input-view computation" data-value="&#8731;">&#8731;</button>
          <button id="log" class="input-view advanced-operator computation" type="button" data-value="log">log</button>
        </li>
        <li>
          <button type="button" class="input-view number" data-value="7">7</button>
          <button type="button" class="input-view number" data-value="8">8</button>
          <button type="button" class="input-view number" data-value="9">9</button>
          <button type="button" class="input-view operator" data-value="+"><i class="fas fa-plus"></i></button>
          <button type="button" class="input-view computation" data-value="ln">ln</button>
        </li>
        <li>
          <button type="button" class="input-view number" data-value="4">4</button>
          <button type="button" class="input-view number" data-value="5">5</button>
          <button type="button" class="input-view number" data-value="6">6</button>
          <button type="button" class="input-view operator first-allowed full" data-value="-"><i class="fas fa-minus"></i></button>
          <button type="button" class="input-view computation" data-value="sin">sin</button>
        </li>
        <li>
          <button type="button" class="input-view number" data-value="1">1</button>
          <button type="button" class="input-view number" data-value="2">2</button>
          <button type="button" class="input-view number" data-value="3">3</button>
          <button type="button" class="input-view operator" data-value="*"><i class="fas fa-times"></i></button>
          <button type="button" class="input-view computation" data-value="cos">cos</button>
        </li>
          <li>
          <button type="button" class="input-view number zero" data-value="0">0</button>
          <button type="button" class="input-view first-allowed bracket left-bracket" data-value="(">(</button>
          <button type="button" class="input-view bracket right-bracket" data-value=")">)</button>
          <button type="button" class="input-view operator" data-value="/"><i class="fas fa-divide"></i></button>
          <button type="button" class="input-view computation" data-value="tan">tan</button>
        </li>
        <li>
          <button type="button" class="input-view operator dot full" data-value=".">,</button>
          <button type="button" class="input-view" data-value="&pi;">&pi;</button>
          <button type="button" class="input-view" data-value="e">e</button>
          <button id="equal" type="button" class=" equal computation" data-value="="><i class="fas fa-equals"></i></button>
        </li>
      </ul>
    </section>
    </div>
  </main>
</body>
</html>
